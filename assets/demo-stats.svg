<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260">
  <defs>
    <style>
      .bg { fill: #0a0a0b; }
      .chrome { fill: #161618; }
      .dot-r { fill: #ff5f56; }
      .dot-y { fill: #ffbd2e; }
      .dot-g { fill: #27c93f; }
      .t-title { fill: #555555; font-family: 'Fira Code', monospace; font-size: 11px; }
      .prompt { fill: #888888; font-family: 'Fira Code', monospace; font-size: 13px; }
      .cmd { fill: #f0f0f0; font-family: 'Fira Code', monospace; font-size: 13px; }
      .accent { fill: #4ade80; font-family: 'Fira Code', monospace; font-size: 13px; font-weight: bold; }
      .label { fill: #555555; font-family: 'Fira Code', monospace; font-size: 13px; }
      .value { fill: #f0f0f0; font-family: 'Fira Code', monospace; font-size: 13px; }
      .brand-accent { fill: #4ade80; font-family: 'Fira Code', monospace; font-size: 13px; font-weight: bold; }
      .brand-dim { fill: #555555; font-family: 'Fira Code', monospace; font-size: 13px; }
      .sep { stroke: #333338; stroke-width: 1; }
    </style>
  </defs>

  <rect width="480" height="260" rx="8" class="bg"/>
  <rect width="480" height="32" rx="8" class="chrome"/>
  <rect y="16" width="480" height="16" class="chrome"/>
  <line x1="0" y1="32" x2="480" y2="32" stroke="#222225" stroke-width="1"/>
  <circle cx="20" cy="16" r="5" class="dot-r"/>
  <circle cx="38" cy="16" r="5" class="dot-y"/>
  <circle cx="56" cy="16" r="5" class="dot-g"/>
  <text x="240" y="20" text-anchor="middle" class="t-title">memory stats</text>

  <!-- Command line -->
  <text x="20" y="62" class="prompt">$</text>
  <text x="36" y="62" class="cmd">memory stats</text>

  <!-- Brand header -->
  <text x="20" y="96" class="brand-accent">MEMORY</text>
  <text x="100" y="96" class="brand-dim">give your ai coding agent memory</text>
  <line x1="20" y1="104" x2="460" y2="104" class="sep"/>

  <!-- Stats -->
  <text x="145" y="132" text-anchor="end" class="label">sessions</text>
  <text x="160" y="132" class="accent">276</text>

  <text x="145" y="156" text-anchor="end" class="label">projects</text>
  <text x="160" y="156" class="value">11</text>

  <text x="145" y="180" text-anchor="end" class="label">chunks</text>
  <text x="160" y="180" class="accent">39,247</text>

  <text x="145" y="204" text-anchor="end" class="label">db size</text>
  <text x="160" y="204" class="value">142.3 MB</text>

  <text x="145" y="228" text-anchor="end" class="label">last indexed</text>
  <text x="160" y="228" class="value">2026-04-04T14:22:08</text>
</svg>
